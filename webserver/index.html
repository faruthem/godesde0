<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prueba de servidor Go</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --border: #d1d5db;
            --ok: #16a34a;
            --error: #dc2626;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin-top: 0;
            font-size: 1.6rem;
        }

        p {
            color: var(--muted);
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 140px;
            gap: 12px;
            margin-bottom: 12px;
        }

        .row {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font: inherit;
            background: white;
            color: inherit;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
            font-family: Consolas, Monaco, monospace;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
            margin-top: 4px;
        }

        button:hover {
            filter: brightness(0.95);
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .status {
            font-weight: 700;
        }

        .status.ok { color: var(--ok); }
        .status.error { color: var(--error); }

        pre {
            margin: 0;
            padding: 16px;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 10px;
            overflow: auto;
            min-height: 180px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .hint {
            font-size: 0.92rem;
            color: var(--muted);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Prueba de servidor Go</h1>
            <p>Usa esta página para enviar peticiones a tu servidor Go local y ver la respuesta.</p>

            <form id="requestForm">
                <div class="grid">
                    <div class="row">
                        <label for="url">URL</label>
                        <input id="url" type="url" value="http://localhost:8080/" />
                    </div>

                    <div class="row">
                        <label for="method">Método</label>
                        <select id="method">
                            <option>GET</option>
                            <option>POST</option>
                            <option>PUT</option>
                            <option>PATCH</option>
                            <option>DELETE</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <label for="body">Body JSON</label>
                    <textarea id="body" placeholder='{"mensaje":"hola"}'>{}</textarea>
                </div>

                <div class="actions">
                    <button type="submit">Enviar petición</button>
                    <span id="status" class="status"></span>
                </div>
            </form>

            <div class="row" style="margin-top: 18px;">
                <label>Respuesta</label>
                <pre id="response">Esperando petición...</pre>
            </div>

            <div class="hint">
                Nota: si hay problemas de CORS, el servidor Go debe permitir solicitudes desde este origen.
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('requestForm');
        const urlInput = document.getElementById('url');
        const methodSelect = document.getElementById('method');
        const bodyInput = document.getElementById('body');
        const responseBox = document.getElementById('response');
        const statusBox = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = urlInput.value.trim();
            const method = methodSelect.value;
            const bodyText = bodyInput.value.trim();

            statusBox.textContent = 'Enviando...';
            statusBox.className = 'status';
            responseBox.textContent = 'Procesando...';

            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (method !== 'GET' && method !== 'HEAD') {
                options.body = bodyText || '{}';
            }

            try {
                const response = await fetch(url, options);
                const contentType = response.headers.get('content-type') || '';
                let data;

                if (contentType.includes('application/json')) {
                    data = JSON.stringify(await response.json(), null, 2);
                } else {
                    data = await response.text();
                }

                statusBox.textContent = `Estado: ${response.status} ${response.statusText}`;
                statusBox.className = response.ok ? 'status ok' : 'status error';

                responseBox.textContent =
                    `URL: ${response.url}\n` +
                    `OK: ${response.ok}\n` +
                    `Estado: ${response.status} ${response.statusText}\n\n` +
                    `Respuesta:\n${data}`;
            } catch (error) {
                statusBox.textContent = 'Error de conexión';
                statusBox.className = 'status error';
                responseBox.textContent = `No se pudo conectar con el servidor.\n\n${error.message}`;
            }
        });
    </script>
</body>
</html>
